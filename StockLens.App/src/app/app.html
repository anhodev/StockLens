<header class="topbar">
  <div class="brand">
    <span class="logo">◧</span>
    <div class="brand-text">
      <span class="brand-name">StockLens</span>
      <span class="brand-sub">Intelligent Inventory Dashboard</span>
    </div>
  </div>

  <nav class="tabs">
    <button [class.active]="tab() === 'dashboard'" (click)="select('dashboard')">Dashboard</button>
    <button [class.active]="tab() === 'inventory'" (click)="select('inventory')">Inventory</button>
    <button [class.active]="tab() === 'strategies'" (click)="select('strategies')">Strategies</button>
  </nav>

  <div class="conn" [class.on]="realtime.connected()">
    <span class="dot"></span>
    {{ realtime.connected() ? 'Live' : 'Offline' }}
  </div>
</header>

<main class="content">
  @switch (tab()) {
    @case ('dashboard') { <app-dashboard /> }
    @case ('inventory') { <app-inventory /> }
    @case ('strategies') { <app-strategies /> }
  }
</main>
