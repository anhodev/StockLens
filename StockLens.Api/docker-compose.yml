services:
  postgres:
    image: postgres:16-alpine
    container_name: stocklens-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: stocklens
      POSTGRES_USER: stocklens
      POSTGRES_PASSWORD: stocklens
    ports:
      - "5433:5432"
    volumes:
      - stocklens_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocklens -d stocklens"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  stocklens_pgdata:
